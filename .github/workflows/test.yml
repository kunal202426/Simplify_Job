name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run pure-function unit tests
        run: node Autofill-Jobs-master/test/run.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: Autofill-Jobs-master/src
        run: npm install
      - name: Build extension
        working-directory: Autofill-Jobs-master/src
        run: npm run build
