<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ATS fixture — learning engine end-to-end</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 20px auto; }
    label { display:block; margin: 10px 0 3px; font-weight: 600; font-size: 13px; }
    input, select { padding: 6px; width: 320px; }
    fieldset { margin: 12px 0; }
    #results { background:#111; color:#0f0; padding:12px; white-space:pre-wrap; font-family:monospace; font-size:12px; }
  </style>
</head>
<body>
  <h1>ATS fixture</h1>

  <!-- FORM A: initial application -->
  <form id="application-form">
    <label for="fn">First Name *</label>
    <input id="fn" name="first_name" type="text" />

    <label for="em">Email Address *</label>
    <input id="em" name="email" type="text" />

    <label for="ph">Mobile Phone Number</label>
    <input id="ph" name="phone" type="text" placeholder="___-___-____" />

    <label for="gen">Gender</label>
    <select id="gen" name="gender">
      <option value="">Select...</option>
      <option value="m">Male</option>
      <option value="f">Female</option>
      <option value="d">Prefer not to say</option>
    </select>

    <label for="grad">Graduation Date</label>
    <input id="grad" name="grad" type="text" placeholder="MM/YYYY" />

    <label for="notice">What is your notice period?</label>
    <input id="notice" name="notice" type="text" />

    <fieldset id="auditor-a">
      <legend>Have you been employed by our statutory auditor?</legend>
      <label><input type="radio" name="auditor" value="yes" /> Yes</label>
      <label><input type="radio" name="auditor" value="no" /> No</label>
    </fieldset>
  </form>

  <!-- FORM B: a different company, reworded compliance + differently-worded enum -->
  <form id="second-form" style="border-top:2px solid #ccc; margin-top:24px;">
    <h2>Second company</h2>
    <label for="notice2">Please state your notice period</label>
    <input id="notice2" name="notice2" type="text" />

    <fieldset id="auditor-b">
      <legend>Are you or have you ever been employed by the firm's external auditor?</legend>
      <label><input type="radio" name="auditor2" value="y" /> Y</label>
      <label><input type="radio" name="auditor2" value="n" /> N</label>
    </fieldset>
  </form>

  <pre id="results">running…</pre>

  <!-- In-memory chrome.storage mock so the learn/recall loop actually persists here. -->
  <script>
    (function () {
      const _local = {}, _sync = {};
      function resolve(store, key) {
        if (key == null) return Object.assign({}, store);
        if (Array.isArray(key)) { const o = {}; key.forEach(k => { if (k in store) o[k] = store[k]; }); return o; }
        const o = {}; if (key in store) o[key] = store[key]; return o;
      }
      window.chrome = {
        storage: {
          local: {
            get: (k, cb) => cb(resolve(_local, k)),
            set: (o, cb) => { Object.assign(_local, o); cb && cb(); },
          },
          sync: {
            get: (k, cb) => cb(resolve(_sync, k)),
            set: (o, cb) => { Object.assign(_sync, o); cb && cb(); },
          },
        },
      };
      // Seed profile
      _sync["First Name"] = "Ada";
      _sync["Email"] = "ada@example.com";
      _sync["Phone"] = "1234567890";
      _sync["Gender"] = "Decline to self identify";
      window.__store = { local: _local, sync: _sync };
    })();
  </script>

  <!-- Load the actual content scripts as classic scripts (validates global sharing). -->
  <script src="../../src/public/contentScripts/utils.js"></script>
  <script src="../../src/public/contentScripts/signature.js"></script>
  <script src="../../src/public/contentScripts/learningStore.js"></script>
  <script src="../../src/public/contentScripts/formatConvert.js"></script>
  <script src="../../src/public/contentScripts/matcher.js"></script>
  <script src="../../src/public/contentScripts/reviewPanel.js"></script>
  <script src="../../src/public/contentScripts/engine.js"></script>

  <!-- Driver -->
  <script>
    const log = [];
    function out(msg) { log.push(msg); document.getElementById("results").textContent = log.join("\n"); console.log("[fixture] " + msg); }
    const assert = (name, cond) => out((cond ? "PASS " : "FAIL ") + name);
    const val = (id) => document.getElementById(id).value;
    const fire = (el, type) => el.dispatchEvent(new Event(type, { bubbles: true }));

    (async function () {
      const res = await getStorageDataSync();
      res["Current Date"] = curDateStr();
      const formA = document.getElementById("application-form");

      // --- Phase 1: first pass ---
      await runLearningEngine(formA, "fixture", res);
      assert("profile: First Name filled", val("fn") === "Ada");
      assert("profile: Email filled", val("em") === "ada@example.com");
      assert("phone reformatted to hint (123-456-7890)", val("ph") === "123-456-7890");
      assert("select mapped 'Decline' -> 'Prefer not to say'", document.getElementById("gen").selectedIndex === 3);
      assert("notice period left empty (needs input)", val("notice") === "");
      assert("auditor radio left empty (needs input)", !document.querySelector('input[name="auditor"]:checked'));

      // --- Phase 2: user fills the leftovers manually; engine should learn ---
      const notice = document.getElementById("notice");
      notice.value = "1 month"; fire(notice, "change");
      const auditorNo = document.querySelector('input[name="auditor"][value="no"]');
      auditorNo.checked = true; fire(auditorNo, "change");
      await new Promise(r => setTimeout(r, 300));
      const bank = await getAllLearned();
      assert("learned bank now has 2 entries", Object.keys(bank).length === 2);

      // --- Phase 3: same questions again -> exact recall ---
      notice.value = ""; auditorNo.checked = false;
      delete formA.__afjEngineRan;
      await runLearningEngine(formA, "fixture", res);
      assert("exact recall: notice period auto-filled", val("notice") === "1 month");
      assert("exact recall: auditor answered 'No'", document.querySelector('input[name="auditor"][value="no"]').checked);

      // --- Phase 4: reworded question + different enum on second form -> fuzzy ---
      const formB = document.getElementById("second-form");
      await runLearningEngine(formB, "fixture", res);
      assert("fuzzy: reworded notice period filled", val("notice2") === "1 month");
      assert("fuzzy: reworded auditor mapped 'No' -> 'N'", document.querySelector('input[name="auditor2"][value="n"]').checked);

      out("DONE");
    })().catch(e => out("ERROR " + (e && e.stack || e)));
  </script>
</body>
</html>
