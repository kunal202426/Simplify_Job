<!doctype html>
<html>
<head><meta charset="utf-8" /><title>Field-error isolation regression</title>
<style>body{font-family:sans-serif;max-width:640px;margin:20px auto}#results{background:#111;color:#0f0;padding:12px;white-space:pre-wrap;font-family:monospace;font-size:12px}</style>
</head>
<body>
  <h1>One broken field must not silently stop the rest of the scan</h1>
  <form id="jobApplicationForm">
    <label for="lastName">Last Name</label><input id="lastName" name="lastName" type="text" />
    <label for="firstName">First Name</label><input id="firstName" name="firstName" type="text" />
    <label for="poison">Poison Field</label><input id="poison" name="poison" type="text" />
    <label for="middleName">Middle Name</label><input id="middleName" name="middleName" type="text" />
    <label for="phone">Phone</label><input id="phone" name="phone" type="text" />
  </form>

  <pre id="results">running…</pre>

  <script>
    (function () {
      const _local = {}, _sync = {};
      function resolve(s, k){ if(k==null) return {...s}; if(Array.isArray(k)){const o={};k.forEach(x=>{if(x in s)o[x]=s[x]});return o;} const o={}; if(k in s)o[k]=s[k]; return o; }
      window.chrome = { runtime: { id: "test-extension-id" }, storage: {
        local:{ get:(k,cb)=>cb(resolve(_local,k)), set:(o,cb)=>{Object.assign(_local,o);cb&&cb();} },
        sync: { get:(k,cb)=>cb(resolve(_sync,k)),  set:(o,cb)=>{Object.assign(_sync,o);cb&&cb();} } } };
      _sync["First Name"] = "Kunal";
      _sync["Last Name"] = "Mathur";
      _sync["Phone"] = "9123456780";
      window.__store = { local: _local, sync: _sync };
    })();
  </script>
  <script src="../../src/public/contentScripts/utils.js"></script>
  <script src="../../src/public/contentScripts/signature.js"></script>
  <script src="../../src/public/contentScripts/learningStore.js"></script>
  <script src="../../src/public/contentScripts/formatConvert.js"></script>
  <script src="../../src/public/contentScripts/matcher.js"></script>
  <script src="../../src/public/contentScripts/reviewPanel.js"></script>
  <script src="../../src/public/contentScripts/engine.js"></script>
  <script>
    const log=[]; function out(m){log.push(m);document.getElementById("results").textContent=log.join("\n");}
    const assert=(n,c)=>out((c?"PASS ":"FAIL ")+n);

    // Sabotage generateSignature so it throws specifically for the "poison" field, simulating
    // an unexpected widget shape triggering an unhandled error mid-scan (the hypothesis for
    // why a real Oracle Cloud page apparently stopped after only 3 fields).
    const realGenerateSignature = generateSignature;
    generateSignature = function (el) {
      if (el && el.id === 'poison') throw new Error('simulated widget error');
      return realGenerateSignature(el);
    };

    (async function () {
      const res = await getStorageDataSync();
      res["Current Date"] = curDateStr();
      const form = document.getElementById('jobApplicationForm');

      await runLearningEngine(form, "fixture", res);
      await new Promise(r => setTimeout(r, 300));

      assert("Last Name (before poison field) filled", document.getElementById('lastName').value === 'Mathur');
      assert("First Name (before poison field) filled", document.getElementById('firstName').value === 'Kunal');
      assert("Middle Name (AFTER poison field) still got processed", !!document.getElementById('middleName').__afjKey);
      assert("Phone (AFTER poison field) still got filled", document.getElementById('phone').value === '9123456780');

      out("DONE");
    })().catch(e => out("ERROR " + (e && e.stack || e)));
  </script>
</body>
</html>
